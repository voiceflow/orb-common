parameters:
  executor:
    type: executor
executor: << parameters.executor >>
working_directory: /home/circleci/code
steps:
  - std_checkout
  - std_restore_cache:
      cache_name: node
      use_lockfile: true
  - std_restore_cache:
      cache_name: build
  - std_restore_cache:
      cache_name: test-dependencies
  - run:
      name: Run Dependency Tests
      command: |
        yarn test:dependencies
  - std_save_cache:
      cache_name: test-dependencies
      path: /home/circleci/code/.turbo/cache
