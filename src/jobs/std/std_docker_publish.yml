parameters:
  executor:
    type: executor
executor: << parameters.executor >>
working_directory: /home/circleci/code
environment:
  ECR_URL: << pipeline.parameters.ecr-url >>
steps:
  - setup_remote_docker
  - std_checkout
  - std_restore_cache:
      cache_name: node
      use_lockfile: true
  - std_restore_cache:
      cache_name: build
  - run:
      name: Docker Publish
      command: |
        docker buildx create --use --bootstrap --name buildy-trying
        yarn docker:publish
