parameters:
  executor:
    type: executor
executor: << parameters.executor >>
working_directory: /home/circleci/code
steps:
  - setup_remote_docker
  - std_checkout
  - attach_workspace:
      at: .
  - std_restore_cache:
      cache_name: vitest-integration
  - run:
      name: Run Integration Tests
      command: |
        yarn ci:test:integration
  - store_artifacts:
      path: integration.report.xml
  - store_artifacts:
      path: sonar
  - store_test_results:
      path: integration.report.xml
  # i don't see any jobs that require this one, do we need to persist? Does another job use these artifacts in the same workflow?
  - persist_to_workspace:
      root: .
      paths:
        - sonar/integration-coverage
  - std_save_cache:
      cache_name: vitest-integration
      path: /home/circleci/code/node_modules/.experimental-vitest-cache
