parameters:
  executor:
    type: executor
executor: << parameters.executor >>
working_directory: /home/circleci/code
steps:
  - std_checkout
  - attach_workspace:
      at: .
  - std_restore_cache:
      cache_name: test-types
  - run:
      name: Check Types
      command: |
        yarn ci:test:types
  - std_save_cache:
      cache_name: test-types
      path: /home/circleci/code/.turbo/cache
