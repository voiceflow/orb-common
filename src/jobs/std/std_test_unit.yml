parameters:
  executor:
    type: executor
executor: << parameters.executor >>
working_directory: /home/circleci/code
steps:
  - std_checkout
  - std_restore_cache:
      cache_name: node
      use_lockfile: true
  - std_restore_cache:
      cache_name: build
  - std_restore_cache:
      cache_name: vitest
  - run:
      name: Run Unit Tests
      command: |
        yarn ci:build
        yarn ci:test:unit --experimental.fsModuleCache
  - store_artifacts:
      path: unit.report.xml
  - store_artifacts:
      path: sonar
  - store_test_results:
      path: unit.report.xml
  - persist_to_workspace:
      root: /home/circleci/code
      paths:
        - sonar/unit-coverage
  - std_save_cache:
      cache_name: vitest
      path: /home/circleci/code/node_modules/.experimental-vitest-cache
