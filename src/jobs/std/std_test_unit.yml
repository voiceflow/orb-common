parameters:
  executor:
    type: executor
executor: << parameters.executor >>
working_directory: /home/circleci/code
steps:
  - std_checkout
  - attach_workspace:
      at: .
  - std_restore_cache:
      cache_name: vitest-unit
  - run:
      name: Run Unit Tests
      command: |
        yarn ci:test:unit
  - store_artifacts:
      path: unit.report.xml
  - store_artifacts:
      path: sonar
  - store_test_results:
      path: unit.report.xml
  - persist_to_workspace:
      root: .
      paths:
        - sonar/unit-coverage
  - std_save_cache:
      cache_name: vitest-unit
      path: /home/circleci/code/node_modules/.experimental-vitest-cache
