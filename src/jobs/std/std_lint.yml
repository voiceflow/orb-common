parameters:
  executor:
    type: executor
executor: << parameters.executor >>
working_directory: /home/circleci/code
steps:
  - std_checkout
  - attach_workspace:
      at: .
  - run:
      name: Run Linting
      command: |
        yarn ci:lint
  - store_artifacts:
      path: reports/lint.report.xml
      destination: lint.report.xml
  - store_test_results:
      path: reports/lint.report.xml
