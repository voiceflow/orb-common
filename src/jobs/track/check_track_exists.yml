parameters:
  component:
    description: Component to check if the track exists
    type: string
  force_create:
    description: Always create track
    type: boolean
    default: false
executor: build-executor
steps:
  - check_track_exists:
      component: "<< parameters.component >>"
      stop_if_not_exists: true
      force_create: << parameters.force_create >>
