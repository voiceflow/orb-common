parameters:
  run_on_root:
    description: Check that allow the command to run on root
    type: boolean
    default: false
  executor:
    description: Executor to run the command on
    type: executor
    default: node-executor
executor: << parameters.executor >>
steps:
  - checkout_clone
  - attach_workspace:
      at: ~/voiceflow
  - run:
      command: cp -R ~/voiceflow/node_modules/.cache/turbo /tmp/turbo-cache
  - install_node_modules
  - run:
      command: |
        rm -rf ~/voiceflow/node_modules/.cache/turbo
        cp -R  /tmp/turbo-cache ~/voiceflow/node_modules/.cache/turbo
  - monorepo_types_tests:
      run_on_root: << parameters.run_on_root >>
      force_execution: true
