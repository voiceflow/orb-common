parameters:
  cache_name:
    type: string
  cache_version:
    type: string
  path:
    type: string
  use_lockfile:
    type: boolean
    default: false
  path_2:
    type: string
    default: ""
steps:
  - unless:
      condition: << parameters.path_2 >>
      steps:
        - save_cache:
            name: Save << parameters.cache_name >> Cache
            key: << parameters.cache_name >-cache-{{ .Environment.CACHE_VERSION }}--branch--{{ .Branch }}--{{ .Revision }}
            paths:
              - << parameters.path >
  - when:
      condition: << parameters.path_2 >>
      steps:
        - save_cache:
            name: Save << parameters.cache_name >> Cache
            key: << parameters.cache_name >-cache-{{ .Environment.CACHE_VERSION }}--branch--{{ .Branch }}--{{ .Revision }}
            paths:
              - << parameters.path >
              - << parameters.path_2 >
  - with:
      condition: << parameters.use_lockfile >>
      steps:
        - unless:
            condition: << parameters.path_2 >>
            steps:
              - save_cache:
                  name: Save << parameters.cache_name >> Cache
                  key: << parameters.cache_name >-cache-{{ .Environment.CACHE_VERSION }}--lockfile--{{ checksum "/home/circleci/code/yarn.lock" }}
                  paths:
                    - << parameters.path >
        - with:
            condition: << parameters.path_2 >>
            steps:
              - save_cache:
                  name: Save << parameters.cache_name >> Cache
                  key: << parameters.cache_name >-cache-{{ .Environment.CACHE_VERSION }}--lockfile--{{ checksum "/home/circleci/code/yarn.lock" }}
                  paths:
                    - << parameters.path >
                    - << parameters.path_2 >
