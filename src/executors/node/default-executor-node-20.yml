parameters:
  default_resource_class:
    description: Default resource class for the executor
    type: string
    default: medium
  tag:
    type: string
    default: 20.17.0-vf-5
working_directory: ~/voiceflow
docker:
  - image: 168387678261.dkr.ecr.us-east-1.amazonaws.com/ci-node-image:<< parameters.tag >>
    aws_auth:
      aws_access_key_id: $AWS_ACCESS_KEY_ID
      aws_secret_access_key: $AWS_SECRET_ACCESS_KEY
resource_class: << parameters.default_resource_class >>
